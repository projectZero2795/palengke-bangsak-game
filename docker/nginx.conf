map $request_uri $bang_sak_cache_control {
    default          "no-store";
    ~^/Build/        "public, max-age=300, must-revalidate";
    ~^/TemplateData/ "public, max-age=86400";
}

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;
    etag on;
    gzip off;

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    add_header Cache-Control $bang_sak_cache_control always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://palengke.es https://*.palengke.es wss:; worker-src 'self' blob:; child-src 'self' blob:; media-src 'self' blob:; frame-ancestors 'self' https://palengke.es https://*.palengke.es" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /build-info.json {
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
